[dependency-groups]
dev = [
    "black",
    "isort",
    "pylint",
    "pytest",
    "pyyaml>=6.0",
]
# Installed by `make install-dev` -- racecar dogfoods its own canonical
# `[dependency-groups].django` + `make install-dev` convention (the same one
# library-pyproject.toml prescribes to consumers). racecar is not itself a `server/`, so this
# group carries the django RUNTIME (django / DOT / webauthn) the generators emit against, plus
# the pylint-django plugin. With it present, racecar lints the generated server the way a
# consumer does, so a generator change that would fail a consumer's lint fails racecar's own
# test suite first.
django = [
    "django>=6.0",
    "pylint-django",
    "pylint-pytest",  # the canonical consumer lint config (library-pyproject) loads this plugin
    "django-oauth-toolkit>=3.2",
    "webauthn>=2.0",
    "django-oauth-toolkit-dcr",
]

[tool.black]
line-length = 88

[tool.isort]
profile = "black"

[tool.pytest.ini_options]
addopts = "-q"

# Telemetry config, read by the probe (sysadmin-hardware/lib/_telemetry.py) and the gate
# ledger (scripts/record_gate.py). Both streams are ON by default (opt-out): a project
# inherits on unless it sets these false here, or opts out per-run via the
# RACECAR_USAGE_TELEMETRY / RACECAR_BUILD_TELEMETRY / RACECAR_TELEMETRY_DIR env vars
# (env wins). Neither on nor off can break a command: off is a no-op, on only appends a
# local, gitignored record. Set false to opt out.
[tool.racecar.telemetry]
usage = true   # runtime resource telemetry -> .telemetry/usage.jsonl
build = true   # gate-outcome / drift telemetry -> .telemetry/build.jsonl
dir = ".telemetry"

[tool.pylint.MASTER]
# Honored by the doc-coherence checks (check_docs / check_file_placement) as the
# one place to scope markdown out of the navigable doc surface. drafts/ holds WIP
# essays and landing copy — scratchpad content, not docs the resolver registers.
ignore-paths = ["^drafts/"]

[tool.pylint."MESSAGES CONTROL"]
# R0801 (duplicate-code): the lens directories (arch-coherence/, doc-coherence/,
# llm-summary/, scripts/) are deliberately import-isolated — a check script in one
# lens may not import a sibling in another, because the lenses are delivered and run
# independently in adopter repos where only one lens tree may be present. The shared
# idioms pylint flags (the `_find_repo_root` .git walk-up, the argparse `--dest`
# block, the CHECK_SCRIPTS/TEMPLATE_FILES manifests) are therefore copied by design,
# not extractable into a common module. Disabled globally rather than per-site
# because the duplicate pairs shift as the scripts evolve.
#
# R0903 (too-few-public-methods): every checker defines a small `Finding` record
# (and a `Rule` Protocol) that is pure data plus a `render` — one public method by
# design. The pattern is pervasive across the auditors; flagging each instance is
# noise, not signal.
disable = ["duplicate-code", "too-few-public-methods"]

[tool.pylint.DESIGN]
# These caps are raised, never disabled, with the rationale recorded here. Each
# breach is in a deliberately-flat stdlib auditor where the linear branch/local
# count is the clearest expression of the rule being checked; decomposing further
# would scatter the logic without reducing it.
# too-many-branches: check_brief.validate walks every brief section in one pass (32);
#   check_todo_format / check_surface_orchestration enumerate format rules inline (13/18).
max-branches = 32
# too-many-locals: scaffolders and sync drivers thread many paths in one frame
#   (init_project, sync_claude_md, sync_scripts, sync_remote, check_todo_format,
#   check_dj_model_ref_as_string — peak 23).
max-locals = 23
# too-many-arguments: init_project scaffolder entry points take one parameter per
#   template substitution (peak 10).
max-args = 10
# too-many-nested-blocks: check_surface_orchestration's manifest walk nests one level
#   past the default (6).
max-nested-blocks = 6
