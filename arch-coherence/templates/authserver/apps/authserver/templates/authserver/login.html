<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
</head>
<body>
  <main>
    <h1>Sign in with your security key</h1>
    <p>Insert your hardware key and touch it when prompted.</p>
    <button id="login">Sign in</button>
    <p id="error" role="alert"></p>
  </main>
  <script>
  // Minimal, self-contained WebAuthn client (no external dependency). The options the
  // server sends carry base64url-encoded binary; decode before navigator.credentials,
  // re-encode the result before POSTing it back.
  const NEXT = {next_json};
  function b64urlToBuf(value) {
    let s = value.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }
  function bufToB64url(buf) {
    const bytes = new Uint8Array(buf);
    let bin = "";
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  function getCookie(name) {
    const m = document.cookie.match("(^|;)\\s*" + name + "=([^;]+)");
    return m ? m.pop() : "";
  }
  async function postJSON(url, data) {
    const opts = { method: "POST", headers: { "X-CSRFToken": getCookie("csrftoken") } };
    if (data !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(data);
    }
    const resp = await fetch(url, opts);
    return resp.json();
  }
  async function signIn() {
    const error = document.getElementById("error");
    error.textContent = "";
    try {
      const options = await postJSON("/webauthn/authenticate/options");
      options.challenge = b64urlToBuf(options.challenge);
      (options.allowCredentials || []).forEach((c) => { c.id = b64urlToBuf(c.id); });
      const assertion = await navigator.credentials.get({ publicKey: options });
      const r = assertion.response;
      const body = {
        id: assertion.id,
        rawId: bufToB64url(assertion.rawId),
        type: assertion.type,
        response: {
          authenticatorData: bufToB64url(r.authenticatorData),
          clientDataJSON: bufToB64url(r.clientDataJSON),
          signature: bufToB64url(r.signature),
          userHandle: r.userHandle ? bufToB64url(r.userHandle) : null,
        },
        clientExtensionResults: assertion.getClientExtensionResults(),
      };
      const verify = await postJSON("/webauthn/authenticate/verify", body);
      if (verify.verified) window.location = verify.next || NEXT;
      else error.textContent = verify.error || "Sign-in failed.";
    } catch (e) {
      error.textContent = String(e);
    }
  }
  document.getElementById("login").addEventListener("click", signIn);
  </script>
</body>
</html>
