<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enroll a security key</title>
</head>
<body>
  <main>
    <h1>Enroll a security key</h1>
    <p>Insert the hardware key to register and touch it when prompted.</p>
    <button id="enroll">Enroll</button>
    <p id="error" role="alert"></p>
  </main>
  <script>
  function getCookie(name) {
    const m = document.cookie.match("(^|;)\\s*" + name + "=([^;]+)");
    return m ? m.pop() : "";
  }
  function b64urlToBuf(value) {
    let s = value.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf.buffer;
  }
  function bufToB64url(buf) {
    const bytes = new Uint8Array(buf);
    let bin = "";
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }
  async function postJSON(url, data) {
    const opts = { method: "POST", headers: { "X-CSRFToken": getCookie("csrftoken") } };
    if (data !== undefined) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(data);
    }
    return (await fetch(url, opts)).json();
  }
  async function enroll() {
    const error = document.getElementById("error");
    error.textContent = "";
    try {
      const options = await postJSON("/webauthn/register/options");
      options.challenge = b64urlToBuf(options.challenge);
      options.user.id = b64urlToBuf(options.user.id);
      (options.excludeCredentials || []).forEach((c) => { c.id = b64urlToBuf(c.id); });
      const cred = await navigator.credentials.create({ publicKey: options });
      const r = cred.response;
      const body = {
        id: cred.id,
        rawId: bufToB64url(cred.rawId),
        type: cred.type,
        response: {
          attestationObject: bufToB64url(r.attestationObject),
          clientDataJSON: bufToB64url(r.clientDataJSON),
          transports: r.getTransports ? r.getTransports() : [],
        },
        clientExtensionResults: cred.getClientExtensionResults(),
      };
      const verify = await postJSON("/webauthn/register/verify", body);
      if (verify.verified) window.location = "/login/";
      else error.textContent = verify.error || "Enrollment failed.";
    } catch (e) {
      error.textContent = String(e);
    }
  }
  document.getElementById("enroll").addEventListener("click", enroll);
  </script>
</body>
</html>
