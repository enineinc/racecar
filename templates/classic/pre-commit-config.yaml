# Canonical racecar pre-commit hooks. Run `pre-commit autoupdate` periodically
# to bump pinned revs.

repos:
  - repo: local
    hooks:
      # isort first (orders imports), then black (formats the result, including the
      # reordered imports). Reverse order would force black to run twice.
      # Both use --settings-file/--config to match `make fmt` exactly.
      - id: isort
        name: isort
        entry: bash -c 'CONF=$(make -s print-LIB_PYPROJECT); python -m isort --settings-file "$CONF" "$@"' --
        language: python
        additional_dependencies: [isort==8.0.1]
        types: [python]
        exclude: '^scripts/'

      - id: black
        name: black
        entry: bash -c 'CONF=$(make -s print-LIB_PYPROJECT); python -m black --config "$CONF" "$@"' --
        language: python
        additional_dependencies: [black==26.5.1]
        types: [python]
        exclude: '^scripts/'

      # djhtml reindents Django/Jinja template tags. types: [html] scopes it so it
      # only fires when HTML is staged — a no-op in repos without templates. Mirrors
      # `make fmt`'s djhtml step. Pin via `pre-commit autoupdate` once adopted.
      - id: djhtml
        name: djhtml
        entry: djhtml
        language: python
        additional_dependencies: [djhtml]
        types: [html]

      - id: import-linter
        name: import-linter
        entry: bash -c 'VENV=; for d in .venv venv ../venv; do [ -d "$d" ] && VENV=$d && break; done; export PATH="${VENV:+$VENV/bin:}$PATH"; CONF=$(make -s print-LIB_PYPROJECT); SERVER=$(make -s print-SERVER); export PYTHONPATH="${SERVER:+$SERVER:}$PYTHONPATH"; lint-imports --config "$CONF"'
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-pyproject
        name: validate library pyproject.toml
        entry: bash -c 'TOML=$(make -s print-LIB_PYPROJECT); validate-pyproject "$TOML"'
        language: python
        additional_dependencies: [validate-pyproject]
        pass_filenames: false
        always_run: true

      - id: no-upward-imports-in-business-modules
        name: arch-coherence/PYTHON.md §1 — business modules must not import from root package directly
        entry: python scripts/check_upward_imports.py
        language: python
        types: [python]
        exclude: '(__main__|__init__)\.py$'

      - id: doc-coherence-mechanical-pre-pass
        name: doc-coherence/README.md — mechanical pre-pass (link / §N / vocabulary drift)
        entry: python scripts/check_docs.py
        language: python
        pass_filenames: false
        always_run: true

      - id: todo-format
        name: shared/TODO_FORMAT.md — TODO item schema (id / Prio / Depends / Updated)
        entry: python scripts/check_todo_format.py
        language: python
        pass_filenames: false
        always_run: true

      - id: file-placement
        name: doc-coherence/README.md — markdown docs placement (top-level whitelist / subdir README+CLAUDE)
        entry: python scripts/check_file_placement.py
        language: python
        pass_filenames: false
        always_run: true

      - id: no-cross-module-string-relations
        name: arch-coherence/DJANGO.md §2 — no cross-module string ORM relations (skipped if no manage.py)
        entry: bash -c 'VENV=; for d in .venv venv ../venv; do [ -d "$d" ] && VENV=$d && break; done; export PATH="${VENV:+$VENV/bin:}$PATH"; if find . -maxdepth 3 -name "manage.py" -not -path "*/.venv/*" -not -path "*/venv/*" | grep -q .; then python scripts/check_dj_model_ref_as_string.py; fi'
        language: system
        pass_filenames: false
        always_run: true

      # shared/VOICE.md — no em-dashes / en-dashes / `--` sentence dashes in prose.
      # Whole-file for Markdown, docstrings only for Python. A generated artifact opts
      # out inclusively by carrying the `racecar:prose-exempt` marker (no ignore-list).
      - id: prose-punctuation
        name: shared/VOICE.md — no em-dashes / en-dashes / `--` in prose (Markdown, Python docstrings)
        entry: python scripts/check_prose_punctuation.py
        language: python
        types_or: [markdown, python]

      # The commit-msg-stage hooks below need `pre-commit install --hook-type commit-msg`
      # (racecar.mk's `install-dev` installs both hook types). They read the commit
      # message, which only exists at commit-msg time.
      - id: version-bump-gate
        name: shared/COMMITS.md — a bumpable commit type must bump the version home
        entry: python scripts/check_version_bump.py
        language: python
        stages: [commit-msg]

      - id: prose-punctuation-commit-msg
        name: shared/VOICE.md — no em-dashes / en-dashes / `--` in the commit message
        entry: python scripts/check_prose_punctuation.py --commit-msg
        language: python
        stages: [commit-msg]
