# templates/classic/server-pyproject.toml -- the Django app pyproject.
#
# Applies to Shape src+server only (see racecar's arch-coherence/PACKAGING.md,
# "Scope"). Copy to:
#
#   server/pyproject.toml
#
# This file is intentionally minimal: it exists so the racecar checker can audit
# the declared Django runtime deps (and, if a project opts into an optional
# `server/requirements.txt`, so that lockfile has a declared source).
#
# It deliberately does not declare:
#   [project]         -- server is not a publishable package; no version, no name
#   [build-system]    -- server is not pip-installable as a wheel; it runs via manage.py
#
# NO [tool.*] here: tool config is single-homed in the library pyproject. Both
# `make fmt` and the pre-commit isort/black hooks invoke the formatters with an
# explicit `--settings-file` / `--config` pointing at the library pyproject, so
# they never walk up to this file -- a [tool.black]/[tool.isort] block here would
# be dead config that only risks drifting from the one home. check_packaging
# flags any [tool.*] in the server pyproject for this reason.
#
# The import-linter contract in the library pyproject prevents the library
# from importing django even though django is installed in the shared venv.
#
# Requires pip >= 25.1 for `pip install --group runtime`. A lockfile is optional
# and not part of canon (PACKAGING.md §5); generate it with your own tool if wanted.

[dependency-groups]
runtime = [
    # Django and its app-runtime peers. Pin major / minor as needed.
    "django>=5.0,<6.0",
    # Add the rest of the server's runtime dependencies here.
    # "djangorestframework>=3.15",
]
